server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
      file-size-threshold: 2KB

app:
  upload:
    dir: ${java.io.tmpdir}/smartconvert/uploads
  cleanup:
    interval: 1800000
    max-age: 3600000

logging:
  level:
    com.smartconvert: DEBUG
