version: '3.8'

services:
  backend:
    build: 
      context: ./backend/smartconvert-backend
      dockerfile: Dockerfile
    container_name: smartconvert-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - APP_UPLOAD_DIR=/tmp/smartconvert/uploads
      - APP_CLEANUP_INTERVAL=1800000
      - APP_CLEANUP_MAX_AGE=3600000
    volumes:
      - upload-data:/tmp/smartconvert/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - smartconvert-network

  frontend:
    build:
      context: ./frontend/smartconvert-frontend
      dockerfile: Dockerfile
    container_name: smartconvert-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartconvert-network

volumes:
  upload-data:
    driver: local

networks:
  smartconvert-network:
    driver: bridge
